<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hammer Forge Studio — Project Dashboard</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="layout">
    <!-- Sidebar Navigation -->
    <nav class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <h1 class="logo">Hammer Forge Studio</h1>
        <span class="subtitle">Project Dashboard</span>
      </div>
      <ul class="nav-list">
        <li><a href="#overview" class="nav-link active" data-section="overview">Overview</a></li>
      </ul>
      <div class="nav-group">
        <h3 class="nav-group-title">Milestones</h3>
        <ul class="nav-list" id="nav-milestones">
          <li class="nav-placeholder">Loading...</li>
        </ul>
      </div>
      <div class="nav-group">
        <h3 class="nav-group-title">Diagrams</h3>
        <ul class="nav-list">
          <li><a href="#diagrams" class="nav-link" data-section="diagrams">Architecture</a></li>
        </ul>
      </div>
    </nav>

    <!-- Main Content Area -->
    <main class="content">
      <header class="content-header">
        <h2 id="content-title">Overview</h2>
        <span class="last-build" id="last-build">Last build: —</span>
      </header>

      <!-- Overview Section -->
      <section id="section-overview" class="section active">
        <div class="card-grid" id="milestones-grid">
          <p class="no-data">Loading milestone data...</p>
        </div>
        <div class="card" id="tickets-summary">
          <h3>Tickets Summary</h3>
          <div id="tickets-summary-content">
            <p class="no-data">Loading ticket data...</p>
          </div>
        </div>
      </section>

      <!-- Milestone Detail Sections (rendered dynamically) -->
      <section id="section-milestones" class="section">
        <div id="milestone-detail"></div>
      </section>

      <!-- Diagrams Section -->
      <section id="section-diagrams" class="section">
        <h3>Dependency Diagrams</h3>
        <div id="diagrams-container">
          <p class="no-data">Loading diagrams...</p>
        </div>
      </section>

      <footer class="content-footer">
        <p>Auto-generated from project data</p>
      </footer>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
